<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogoAdder Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">LogoAdder <span>Ultra</span></div>
            
            <div class="control-section">
                <div class="input-group">
                    <label>១. ជ្រើសរើសរូបភាព</label>
                    <input type="file" id="bgInput" multiple accept="image/*">
                    <small id="fileCount" class="status-muted">រកមិនឃើញរូបភាព</small>
                </div>

                <div class="input-group">
                    <label>២. ជ្រើសរើស Logo</label>
                    <input type="file" id="logoInput" accept="image/*">
                    <small id="logoStatus" class="status-muted">រកមិនឃើញ Logo</small>
                </div>

                <div class="input-group">
                    <label>៣. ទីតាំង Logo</label>
                    <select id="position">
                        <option value="top-left">លើ-ឆ្វេង</option>
                        <option value="top-right">លើ-ស្តាំ</option>
                        <option value="bottom-left">ក្រោម-ឆ្វេង</option>
                        <option value="bottom-right" selected>ក្រោម-ស្តាំ</option>
                        <option value="center">កណ្ដាល</option>
                    </select>
                </div>

                <div class="margin-row">
                    <div class="input-group">
                        <label>Margin Y</label>
                        <input type="number" id="marginY" value="20" class="fancy-input">
                    </div>
                    <div class="input-group">
                        <label>Margin X</label>
                        <input type="number" id="marginX" value="20" class="fancy-input">
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label>ទំហំ Logo (%)</label>
                        <span id="sizeVal">15%</span>
                    </div>
                    <input type="range" id="sizeSlider" min="5" max="50" value="15">
                </div>
            </div>

            <div class="action-area">
                <button id="downloadBtn" class="primary-btn">ចាប់ផ្ដើមដំណើរការ</button>
                <div id="zipDownloadContainer" style="display: none;">
                    <button id="finalZipBtn" class="secondary-btn">ទាញយកជា ZIP</button>
                </div>
            </div>

            <div class="footer">
                <p>Created by <span class="author">THANUN</span></p>
            </div>
        </aside>

        <main class="main-content">
            <div class="preview-stage">
                <div class="canvas-wrapper">
                    <canvas id="mainCanvas"></canvas>
                    <div class="floating-nav">
                        <button id="prevBtn" class="nav-btn">‹</button>
                        <span id="navStatus">0 / 0</span>
                        <button id="nextBtn" class="nav-btn">›</button>
                    </div>
                </div>
            </div>
            
            <progress id="progressBar" value="0" max="100"></progress>

            <div id="results-section" class="results-container">
                <div class="gallery-header">
                    <h3>រូបភាពដែលរួចរាល់</h3>
                    <p>សង្កត់លើរូបដើម្បី Save ចូល Gallery</p>
                </div>
                <div id="resultsGallery" class="results-gallery"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
