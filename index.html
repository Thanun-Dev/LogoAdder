<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>កម្មវិធីដាក់ Logo លើរូបភាព</title>
    <link rel="icon" type="image/x-icon" href="myicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <span class="logo-icon">🖼️</span> 
                កម្មវិធីដាក់ Logo លើរូបភាព
            </div>
            
            <div class="control-section">
                <div class="input-group">
                    <label>ជ្រើសរើសរូបភាព</label>
                    <input type="file" id="bgInput" multiple accept="image/*">
                    <small id="fileCount" class="status-muted">រកមិនឃើញរូបភាព</small>
                </div>

                <div class="input-group">
                    <label>ជ្រើសរើស Logo</label>
                    <input type="file" id="logoInput" accept="image/*">
                    <small id="logoStatus" class="status-muted">រកមិនឃើញ Logo</small>
                </div>

                <div class="input-group">
    <label>កំណត់ទីតាំង Logo</label>
    <div class="position-grid" id="posGrid">
        <button type="button" class="pos-btn" data-value="top-left">
            <div class="corner-icon tl"></div><span>លើ-ឆ្វេង</span>
        </button>
        <button type="button" class="pos-btn active" data-value="top-right">
            <div class="corner-icon tr"></div><span>លើ-ស្តាំ</span>
        </button>
        <button type="button" class="pos-btn" data-value="bottom-left">
            <div class="corner-icon bl"></div><span>ក្រោម-ឆ្វេង</span>
        </button>
        <button type="button" class="pos-btn" data-value="bottom-right">
            <div class="corner-icon br"></div><span>ក្រោម-ស្តាំ</span>
        </button>
        <button type="button" class="pos-btn" data-value="center">
    <div class="corner-icon mid"></div>
    <span>កណ្ដាល</span>
</button>
    </div>
    <input type="hidden" id="position" value="top-right">
</div>

                <div class="margin-row">
                    <div class="input-group">
                        <label>Margin Y</label>
                        <input type="number" id="marginY" value="30" class="fancy-input">
                    </div>
                    <div class="input-group">
                        <label>Margin X</label>
                        <input type="number" id="marginX" value="30" class="fancy-input">
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row" style="display:flex; justify-content:space-between;">
                        <label>ទំហំ Logo (%)</label>
                        <span id="sizeVal">10%</span>
                    </div>
                    <input type="range" id="sizeSlider" min="5" max="50" value="10">
                </div>
            </div>

            <div class="action-area">
                <button id="downloadBtn" class="primary-btn">ចាប់ផ្ដើមដំណើរការ</button>
                <div id="zipDownloadContainer" style="display: none; width:100%;">
                    <button id="finalZipBtn" class="secondary-btn">ទាញយកជា ZIP</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="preview-stage">
                <div class="canvas-wrapper">
                    <canvas id="mainCanvas"></canvas>
                    <div class="floating-nav">
                        <button id="prevBtn" class="nav-btn">‹</button>
                        <span id="navStatus">0 / 0</span>
                        <button id="nextBtn" class="nav-btn">›</button>
                    </div>
                </div>
            </div>
            
            <progress id="progressBar" value="0" max="100"></progress>

            <div id="results-section" class="results-container">
                <div class="gallery-header">
                    <h3>រូបភាពដែលរួចរាល់</h3>
                    <p>សង្កត់លើរូបដើម្បី Save ចូល Gallery (Hold To Save)</p>
                </div>
                <div id="resultsGallery" class="results-gallery"></div>
            </div>
            <div class="footer">
                <p>បង្កើតឡើងដោយ <a href="https://www.facebook.com/thanun2903" target="_blank" class="author-link">
            <span class="author">THANUN</span>
        </a></p>
                
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
