<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>LogoAdder Ultra Web</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2 class="brand">LogoAdder <span>Ultra</span></h2>
            
            <div class="input-group">
                <label>១. ជ្រើសរើសរូបភាព (Select Files)</label>
                <input type="file" id="bgInput" multiple accept="image/*">
                <small id="fileCount" class="status-text">គ្មានរូបភាព</small>
            </div>

            <div class="input-group">
                <label>២. ជ្រើសរើស Logo</label>
                <input type="file" id="logoInput" accept="image/*">
                <small id="logoStatus" class="status-text">គ្មាន Logo</small>
            </div>

            <div class="input-group">
                <label>៣. ទីតាំង Logo</label>
                <select id="position">
                    <option value="top-left">លើ-ឆ្វេង</option>
                    <option value="top-right">លើ-ស្តាំ</option>
                    <option value="bottom-left">ក្រោម-ឆ្វេង</option>
                    <option value="bottom-right" selected>ក្រោម-ស្តាំ</option>
                    <option value="center">កណ្ដាល</option>
                </select>
            </div>

            <div class="margin-row">
                <div class="input-group">
                    <label>Margin លើ-ក្រោម</label>
                    <input type="number" id="marginY" value="20" class="fancy-input">
                </div>
                <div class="input-group">
                    <label>Margin ឆ្វេង-ស្តាំ</label>
                    <input type="number" id="marginX" value="20" class="fancy-input">
                </div>
            </div>

            <div class="input-group">
                <div class="label-row">
                    <label>ទំហំ Logo (%)</label>
                    <span id="sizeVal">15%</span>
                </div>
                <input type="range" id="sizeSlider" min="5" max="50" value="15" class="fancy-slider">
            </div>

            <div class="input-group">
                <div class="label-row">
                    <label>កម្រិតច្បាស់ (Opacity)</label>
                    <span id="opacityVal">100%</span>
                </div>
                <input type="range" id="opacitySlider" min="10" max="100" value="100" class="fancy-slider">
            </div>

            <button id="downloadBtn" class="primary-btn">ចាប់ផ្ដើមដំណើរការ</button>
            
            <div class="footer">
                <p>កម្មវិធីបង្កើតដោយ</p>
                <h3 class="author">THANUN</h3>
            </div>
        </aside>

        <main class="main-content">
            <div class="preview-container">
                <canvas id="mainCanvas"></canvas>
                
                <div class="nav-bar">
                    <button id="prevBtn" class="nav-btn">‹ មុន</button>
                    <span id="navStatus">0 / 0</span>
                    <button id="nextBtn" class="nav-btn">បន្ទាប់ ›</button>
                </div>
            </div>
            <progress id="progressBar" value="0" max="100"></progress>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
